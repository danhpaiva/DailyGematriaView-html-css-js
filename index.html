<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Gematria View</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1 class="header__title">Daily Gematria View</h1>
        <p class="header__subtitle">Redução Teosófica &amp; Simbolismo Judaico</p>
      </header>

      <section class="card" id="result" aria-live="polite">
        <div class="card__row">
          <span class="card__label">Data</span>
          <span class="card__value" id="display-date"></span>
        </div>

        <div class="card__divider"></div>

        <div class="card__row">
          <span class="card__label">Número do Dia</span>
          <span class="card__value card__value--number" id="display-number"></span>
        </div>

        <div class="card__divider"></div>

        <div class="card__meaning">
          <span class="card__label">Significado</span>
          <p class="card__meaning-text" id="display-meaning"></p>
        </div>
      </section>

      <!-- Birthday card -->
      <section class="card card--birthday" id="birthday-card" aria-live="polite">
        <!-- State: no birthday saved -->
        <div id="birthday-form">
          <p class="card__label" style="margin-bottom:.75rem">Número de Destino</p>
          <div class="birthday-input-row">
            <input
              type="date"
              id="birthday-input"
              class="birthday-input"
              aria-label="Data de aniversário"
            />
            <button class="birthday-btn" id="birthday-save">Salvar</button>
          </div>
          <p class="birthday-hint">Informe sua data de nascimento para calcular seu número de destino.</p>
        </div>

        <!-- State: birthday saved (hidden until filled) -->
        <div id="birthday-result" hidden>
          <div class="card__row">
            <span class="card__label">Aniversário</span>
            <span class="card__value" id="display-birthday"></span>
          </div>

          <div class="card__divider"></div>

          <div class="card__row">
            <span class="card__label">Número de Destino</span>
            <span class="card__value card__value--number card__value--destiny" id="display-destiny"></span>
          </div>

          <div class="card__divider"></div>

          <div class="card__meaning">
            <span class="card__label">Significado</span>
            <p class="card__meaning-text" id="display-destiny-meaning"></p>
          </div>

          <div class="card__divider"></div>

          <div class="birthday-actions">
            <button class="birthday-btn birthday-btn--ghost" id="birthday-edit">Alterar data</button>
          </div>
        </div>
      </section>

      <footer class="footer">
        <p>Baseado no simbolismo dos números na tradição judaica</p>
      </footer>
    </main>

    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
