<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Gematria View</title>

    <!-- Aplica tema ANTES do render para evitar flash -->
    <script>
      (function () {
        const saved = localStorage.getItem('gematria_theme');
        const preferred = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', saved ?? preferred);
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="header__top">
          <h1 class="header__title">Daily Gematria View</h1>
          <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">
            <!-- Ícone Sol (tema escuro ativo — clique para claro) -->
            <svg class="theme-toggle__icon theme-toggle__icon--sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1"  x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22"   x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12"  x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <!-- Ícone Lua (tema claro ativo — clique para escuro) -->
            <svg class="theme-toggle__icon theme-toggle__icon--moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
        <p class="header__subtitle">Redução Teosófica &amp; Simbolismo Judaico</p>
      </header>

      <section class="card" id="result" aria-live="polite">
        <div class="card__row">
          <span class="card__label">Data</span>
          <span class="card__value" id="display-date"></span>
        </div>

        <div class="card__divider"></div>

        <div class="card__row">
          <span class="card__label">Número do Dia</span>
          <span class="card__value card__value--number" id="display-number"></span>
        </div>

        <div class="card__divider"></div>

        <div class="card__meaning">
          <span class="card__label">Significado</span>
          <p class="card__meaning-text" id="display-meaning"></p>
        </div>

        <div class="card__divider"></div>

        <div class="card__actions">
          <button class="share-btn" id="share-daily" aria-label="Compartilhar número do dia">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Compartilhar
          </button>
        </div>
      </section>

      <!-- Birthday card -->
      <section class="card card--birthday" id="birthday-card" aria-live="polite">
        <div id="birthday-form">
          <p class="card__label" style="margin-bottom:.75rem">Número de Destino</p>
          <div class="birthday-input-row">
            <input
              type="date"
              id="birthday-input"
              class="birthday-input"
              aria-label="Data de aniversário"
            />
            <button class="birthday-btn" id="birthday-save">Salvar</button>
          </div>
          <p class="birthday-hint">Informe sua data de nascimento para calcular seu número de destino.</p>
        </div>

        <div id="birthday-result" hidden>
          <div class="card__row">
            <span class="card__label">Aniversário</span>
            <span class="card__value" id="display-birthday"></span>
          </div>

          <div class="card__divider"></div>

          <div class="card__row">
            <span class="card__label">Número de Destino</span>
            <span class="card__value card__value--number card__value--destiny" id="display-destiny"></span>
          </div>

          <div class="card__divider"></div>

          <div class="card__meaning">
            <span class="card__label">Significado</span>
            <p class="card__meaning-text" id="display-destiny-meaning"></p>
          </div>

          <div class="card__divider"></div>

          <div class="birthday-actions">
            <button class="share-btn share-btn--ghost" id="share-destiny" aria-label="Compartilhar número de destino">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Compartilhar
            </button>
            <button class="birthday-btn birthday-btn--ghost" id="birthday-edit">Alterar data</button>
          </div>
        </div>
      </section>

      <footer class="footer">
        <p>Baseado no simbolismo dos números na tradição judaica</p>
      </footer>
    </main>

    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
